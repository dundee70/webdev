<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Super Mario Professionale</title>
    <style>
        body {
            margin: 0;
            background: #5c94fc;
            overflow: hidden
        }

        canvas {
            display: block;
            margin: auto;
            background: #87ceeb
        }
    </style>
</head>

<body>

    <canvas id="game" width="960" height="480"></canvas>

    <script>
        const c = document.getElementById("game");
        const ctx = c.getContext("2d");

        const GRAVITY = 0.7;
        let cameraX = 0;

        // ===== PLAYER =====
        const player = {
            x: 100, y: 0, w: 38, h: 48,
            dx: 0, dy: 0,
            speed: 4.8,
            jump: 15,
            grounded: false,
            big: false,
            lives: 3,
            score: 0,
            coins: 0
        };

        // ===== INPUT =====
        const keys = {};
        onkeydown = e => keys[e.code] = true;
        onkeyup = e => keys[e.code] = false;

        // ===== LEVEL =====
        const levelEnd = 4200;

        const platforms = [
            { x: 0, y: 430, w: 4500, h: 50, type: "ground" },
            { x: 300, y: 340, w: 80, h: 20, type: "brick" },
            { x: 380, y: 340, w: 80, h: 20, type: "question" },
            { x: 460, y: 340, w: 80, h: 20, type: "brick" },
            { x: 700, y: 280, w: 120, h: 20, type: "brick" },
            { x: 1100, y: 320, w: 120, h: 20, type: "question" },
            { x: 1600, y: 260, w: 160, h: 20, type: "brick" },
            { x: 2100, y: 300, w: 200, h: 20, type: "brick" },
            { x: 2600, y: 240, w: 200, h: 20, type: "question" },
            { x: 3000, y: 340, w: 200, h: 20, type: "brick" }
        ];

        // ===== ENEMIES =====
        const enemies = [
            { x: 600, y: 390, w: 40, h: 40, dx: -1.2, alive: true },
            { x: 1400, y: 390, w: 40, h: 40, dx: -1.2, alive: true },
            { x: 2300, y: 390, w: 40, h: 40, dx: -1.2, alive: true },
            { x: 3200, y: 390, w: 40, h: 40, dx: -1.2, alive: true }
        ];

        // ===== ITEMS =====
        const mushrooms = [];
        const coins = [];

        // ===== FLAG =====
        const flag = { x: 4000, y: 200, w: 20, h: 230 };

        // ===== COLLISION =====
        function hit(a, b) {
            return a.x < b.x + b.w && a.x + a.w > b.x &&
                a.y < b.y + b.h && a.y + a.h > b.y;
        }

        // ===== DAMAGE =====
        function damage() {
            player.lives--;
            if (player.lives <= 0) {
                alert("GAME OVER");
                location.reload();
            }
            respawn();
        }

        function respawn() {
            player.x = cameraX + 80;
            player.y = 0;
            player.dy = 0;
        }

        // ===== UPDATE =====
        function update() {

            // Movimento
            player.dx = 0;
            if (keys.ArrowRight) player.dx = player.speed;
            if (keys.ArrowLeft) player.dx = -player.speed;

            if (keys.Space && player.grounded) {
                player.dy = -player.jump;
                player.grounded = false;
            }

            // Fisica
            player.dy += GRAVITY;
            player.x += player.dx;
            player.y += player.dy;
            player.grounded = false;

            // Piattaforme
            platforms.forEach(p => {
                if (hit(player, p)) {

                    // sopra
                    if (player.dy >= 0 && player.y + player.h - player.dy <= p.y) {
                        player.y = p.y - player.h;
                        player.dy = 0;
                        player.grounded = true;
                    }
                    // sotto
                    else if (player.dy < 0) {
                        if (p.type === "brick") {
                            p.broken = true;
                            player.score += 50;
                        }

                        if (p.type === "question" && !p.used) {
                            p.used = true;
                            if (Math.random() < 0.5)
                                coins.push({ x: p.x + 25, y: p.y - 30, w: 20, h: 20 });
                            else
                                mushrooms.push({ x: p.x + 25, y: p.y - 40, w: 30, h: 30, dx: 1 });
                        }
                        player.dy = 0;
                    }
                }
            });

            // rimuovi blocchi rotti
            for (let i = platforms.length - 1; i >= 0; i--)
                if (platforms[i].broken) platforms.splice(i, 1);

            // ===== MUSHROOM =====
            mushrooms.forEach(m => {
                m.x += m.dx;
                if (hit(player, m)) {
                    player.big = true;
                    player.h = 70;
                    player.score += 200;
                    m.dead = true;
                }
            });
            for (let i = mushrooms.length - 1; i >= 0; i--)
                if (mushrooms[i].dead) mushrooms.splice(i, 1);

            // ===== COINS =====
            coins.forEach(cn => {
                if (hit(player, cn)) {
                    player.coins++;
                    player.score += 100;
                    cn.dead = true;
                }
            });
            for (let i = coins.length - 1; i >= 0; i--)
                if (coins[i].dead) coins.splice(i, 1);

            // ===== ENEMIES =====
            enemies.forEach(e => {
                if (!e.alive) return;
                e.x += e.dx;

                if (hit(player, e)) {
                    if (player.dy > 0) {
                        e.alive = false;
                        player.dy = -10;
                        player.score += 150;
                    } else damage();
                }
            });

            // ===== CADUTA =====
            if (player.y > c.height) damage();

            // ===== CAMERA =====
            cameraX = player.x - 200;
            if (cameraX < 0) cameraX = 0;

            // ===== VITTORIA =====
            if (hit(player, flag)) {
                alert("HAI VINTO!");
                location.reload();
            }
        }

        // ===== DRAW =====
        function draw() {

            ctx.clearRect(0, 0, c.width, c.height);

            ctx.save();
            ctx.translate(-cameraX, 0);

            // Player
            ctx.fillStyle = player.big ? "#ff4444" : "red";
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // Piattaforme
            platforms.forEach(p => {
                if (p.type === "ground") ctx.fillStyle = "#5c3a21";
                else if (p.type === "brick") ctx.fillStyle = "#b85f2e";
                else ctx.fillStyle = "#ffd800";
                ctx.fillRect(p.x, p.y, p.w, p.h);
            });

            // Nemici
            ctx.fillStyle = "brown";
            enemies.forEach(e => {
                if (e.alive) ctx.fillRect(e.x, e.y, e.w, e.h);
            });

            // Funghi
            ctx.fillStyle = "orange";
            mushrooms.forEach(m => ctx.fillRect(m.x, m.y, m.w, m.h));

            // Monete
            ctx.fillStyle = "yellow";
            coins.forEach(cn => ctx.fillRect(cn.x, cn.y, cn.w, cn.h));

            // Bandiera
            ctx.fillStyle = "white";
            ctx.fillRect(flag.x, flag.y, flag.w, flag.h);

            ctx.restore();

            // HUD
            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.fillText("Punti: " + player.score, 20, 30);
            ctx.fillText("Monete: " + player.coins, 20, 60);
            ctx.fillText("Vite: " + player.lives, 20, 90);
        }

        // ===== LOOP =====
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>

</html>
