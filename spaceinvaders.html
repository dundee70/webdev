<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Invaders</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #111;
            font-family: 'Courier New', monospace;
            background-image: radial-gradient(circle at 50% 50%, #003 0%, #000 100%);
            overflow: hidden;
        }
        
        #gameContainer {
            text-align: center;
            position: relative;
        }
        
        #gameCanvas {
            border: 3px solid #0f0;
            background-color: #000;
            box-shadow: 0 0 20px #0f0;
        }
        
        * {
            user-select: none;
        }
        #statusBar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 800px;
            margin: 0 auto 12px;
            padding: 0 8px;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
        }
        #score {
            color: #0f0;
            font-size: 28px;
            margin: 0;
            text-shadow: 0 0 10px #0f0;
        }
        
        #level {
            color: #0ff;
            font-size: 24px;
            margin: 0;
            text-shadow: 0 0 10px #0ff;
        }
        
        #lives {
            color: #ff0;
            font-size: 24px;
            margin: 0;
            min-width: 185px;
            text-align: left;
            display: inline-block;
            text-shadow: 0 0 10px #ff0;
        }
        
        
        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #f00;
            font-size: 80px;
            font-weight: 800;
            display: none;
            text-shadow: 0 0 30px #f00;
            z-index: 100;
        }
        
        #controls {
            color: #0af;
            font-size: 18px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="statusBar">
            <div id="level">LEVEL: 01</div>
            <div id="score">SCORE: 0000</div>
            <div id="lives">LIVES: ❤❤❤</div>
        </div>
        <canvas id="gameCanvas" width="800" height="600" tabindex="0"></canvas>
        <div id="gameOver">GAME OVER</div>
        <div id="controls">S: START | CONTROLS: ← → MOVE | SPACE FIRE</div>
    </div>

    <script>
        // DOM elements
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const levelElement = document.getElementById('level');
        const livesElement = document.getElementById('lives');
        const gameOverElement = document.getElementById('gameOver');

        // Audio Context for the game sounds
        let audioContext;
        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
            console.log("Audio not supported in this browser");
        }
        
        // Function for creating base sounds
        function createSound(frequency, duration, type = 'square') {
            if (!audioContext || audioContext.state === 'suspended') return;
            
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = frequency;
            oscillator.type = type;
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        // Suoni Space Invaders classici
        const sounds = {
            // Sparo del giocatore - laser profondo e potente
            shoot: () => {
                if (!audioContext || audioContext.state === 'suspended') return;
                const now = audioContext.currentTime;
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                const filter = audioContext.createBiquadFilter();
                
                osc.connect(filter);
                filter.connect(gain);
                gain.connect(audioContext.destination);
                
                osc.type = 'square';
                osc.frequency.setValueAtTime(800, now);
                osc.frequency.exponentialRampToValueAtTime(400, now + 0.2);
                
                gain.gain.setValueAtTime(0.3, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                
                osc.start(now);
                osc.stop(now + 0.15);
            },
            
            // Sparo nemici - suono in stile navicella giocatore
            enemyShoot: () => {
                if (!audioContext || audioContext.state === 'suspended') return;
                const now = audioContext.currentTime;
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();

                osc.connect(gain);
                gain.connect(audioContext.destination);

                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(900, now);
                osc.frequency.exponentialRampToValueAtTime(450, now + 0.16);

                gain.gain.setValueAtTime(0.28, now);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.16);

                osc.start(now);
                osc.stop(now + 0.16);
            },
            
            // Esplosione nemico (e navicella) - durata più lunga + scende verso grave
            explosion: () => {
                if (!audioContext || audioContext.state === 'suspended') return;
                const now = audioContext.currentTime;
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                const filter = audioContext.createBiquadFilter();

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(audioContext.destination);

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(220, now);
                osc.frequency.exponentialRampToValueAtTime(35, now + 0.8);

                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(1200, now);
                filter.frequency.exponentialRampToValueAtTime(140, now + 0.8);

                gain.gain.setValueAtTime(0.5, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.8);

                osc.start(now);
                osc.stop(now + 0.8);
            },
            
            // Colpo ricevuto
            hit: () => {
                if (!audioContext || audioContext.state === 'suspended') return;
                const now = audioContext.currentTime;
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                
                osc.connect(gain);
                gain.connect(audioContext.destination);
                
                osc.type = 'square';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(100, now + 0.08);
                
                gain.gain.setValueAtTime(0.25, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.08);
                
                osc.start(now);
                osc.stop(now + 0.08);
            },
            
            // Movimento nemici - il classico boom-boom del gioco originale
            move: (step = 1) => {
                if (!audioContext || audioContext.state === 'suspended') return;
                const now = audioContext.currentTime;
                const baseFreq = Math.max(70, 230 - (step * 2));

                const osc1 = audioContext.createOscillator();
                const gain1 = audioContext.createGain();
                osc1.connect(gain1);
                gain1.connect(audioContext.destination);
                osc1.type = 'square';
                osc1.frequency.value = baseFreq;
                gain1.gain.setValueAtTime(0.01, now);
                gain1.gain.exponentialRampToValueAtTime(0.01, now + 0.04);
                osc1.start(now);
                osc1.stop(now + 0.04);

                const osc2 = audioContext.createOscillator();
                const gain2 = audioContext.createGain();
                osc2.connect(gain2);
                gain2.connect(audioContext.destination);
                osc2.type = 'square';
                osc2.frequency.value = baseFreq * 0.8;
                gain2.gain.setValueAtTime(0.05, now + 0.05);
                gain2.gain.exponentialRampToValueAtTime(0.01, now + 0.09);
                osc2.start(now + 0.05);
                osc2.stop(now + 0.09);
            }
        };

        // Variabili di gioco
        let score = 0;
        let level = 1;
        let lives = 3;
        let gameRunning = false;
        let animationId;
        let lastEnemyShot = 0;
        let enemyShotInterval = 1000;
        let lastMoveSound = 0;
        let keys = {}; // Variabile per i tasti premuti

        let isPlayerExploding = false;
        let playerExplosionEnd = 0;
        let isFinalExplosion = false;
        let playerExplosionRadius = 0;

        // Variabili per esplosioni nemici
        let enemyExplosions = []; // Array di esplosioni attive
        const maxEnemyExplosions = 50; // Limite massimo di esplosioni simultanee

        // Variabili per animazioni nemici
        let enemiesMoving = false; // true quando i nemici si stanno muovendo (occhi chiusi)
        let enemiesMovingEndTime = 0; // quando finisce l'animazione degli occhi

        // Giocatore
        const player = {
            x: canvas.width / 2 - 25,
            y: canvas.height - 50,
            width: 50,
            height: 30,
            speed: 5,
            color: '#0f0',
            lastShot: 0,
            shotDelay: 300
        };

        // Proiettili del giocatore
        const playerBullets = [];
        const bulletSpeed = 10;
        const bulletWidth = 4;
        const bulletHeight = 15;

        // Proiettili dei nemici
        const enemyBullets = [];
        const enemyBulletSpeed = 5;
        const enemyBulletWidth = 6;
        const enemyBulletHeight = 12;
        const maxEnemyBullets = 200; // Limite massimo di proiettili nemici

        // Nemici
        const enemies = [];
        const enemyRows = 5;
        const enemyCols = 10;
        const enemyWidth = 40;
        const enemyHeight = 30;
        let enemySpeed = 0.8;
        let enemyDirection = 1;
        let enemyMoveTimer = 0;
        const enemyMoveInterval = 5;
        const totalEnemies = enemyRows * enemyCols; // totale nemici all'inizio

        // FPS monitor
        let fpsEnabled = false;
        let lastFrameTime = performance.now();
        let fpsValue = 0;
        let fpsHistory = [];
        const fpsHistorySize = 30; // media su 30 frame

        // Nave bonus
        let bonusShip = null; // {x, y, width, height, speed, lastShot, bonusPoints}
        let bonusShipSpawnTimer = 0;
        let bonusShipSpawnInterval = 180; // ogni 3 secondi circa (ridotto per test)
        let bonusScoreDisplay = null; // {x, y, score, startTime, duration}

        // Stelle di sfondo
        let stars = [];
        let starsEnabled = true; // abilita/disabilita sfondo stellato
        function initStars() {
            stars = [];
            const starCount = 60;
            for (let i = 0; i < starCount; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.2 + 0.4,
                    phase: Math.random() * Math.PI * 2
                });
            }
        }

        // Barriere
        const barriers = [];
        const barrierWidth = 80;
        const barrierHeight = 40;

        // Inizializza i nemici
        function initEnemies() {
            enemies.length = 0;
            for (let row = 0; row < enemyRows; row++) {
                for (let col = 0; col < enemyCols; col++) {
                    enemies.push({
                        x: col * (enemyWidth + 15) + 50,
                        y: row * (enemyHeight + 15) + 50,
                        width: enemyWidth,
                        height: enemyHeight,
                        color: row % 3 === 0 ? '#f00' : row % 3 === 1 ? '#ff0' : '#0ff',
                        points: (enemyRows - row) * 10,
                        canShoot: true,
                        isShooting: false, // true quando sta sparando (bocca aperta)
                        shootingEndTime: 0 // quando finisce l'animazione della bocca
                    });
                }
            }
        }

        // Inizializza le barriere
        function initBarriers() {
            barriers.length = 0;
            for (let i = 0; i < 4; i++) {
                barriers.push({
                    x: (canvas.width / 5) * (i + 1) - barrierWidth / 2,
                    y: canvas.height - 150,
                    width: barrierWidth,
                    height: barrierHeight,
                    blocks: []
                });
                
                for (let y = 0; y < 4; y++) {
                    for (let x = 0; x < 8; x++) {
                        barriers[i].blocks.push({
                            x: x * 10,
                            y: y * 10,
                            width: 8,
                            height: 8,
                            active: true
                        });
                    }
                }
            }
        }

        // Disegna il giocatore con effetti moderni
        function drawPlayer() {
            const centerX = player.x + player.width / 2;
            const centerY = player.y + player.height / 2;
            
            // Effetto glow intorno alla navicella
            const glowGradient = ctx.createRadialGradient(
                centerX, centerY, 10,
                centerX, centerY, 45
            );
            glowGradient.addColorStop(0, hexToRgba('#0f0', 0.3));
            glowGradient.addColorStop(0.5, hexToRgba('#0f0', 0.1));
            glowGradient.addColorStop(1, hexToRgba('#0f0', 0));
            
            ctx.fillStyle = glowGradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 45, 0, Math.PI * 2);
            ctx.fill();
            
            // Corpo principale della navicella (forma triangolare futuristica)
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.moveTo(centerX, player.y);           // Punta in alto
            ctx.lineTo(player.x + player.width, player.y + player.height); // Angolo basso destra
            ctx.lineTo(player.x, player.y + player.height);               // Angolo basso sinistra
            ctx.closePath();
            ctx.fill();
            
            // Bordo luminoso del corpo
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            
            // Cabina/finestra frontale (cerchio central)
            ctx.fillStyle = '#87ceeb'; // Azzurro cielo
            ctx.beginPath();
            ctx.arc(centerX, player.y + player.height/2, 6, 0, Math.PI * 2);
            ctx.fill();
            
            // Pupilla della cabina
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(centerX, player.y + player.height/2, 3, 0, Math.PI * 2);
            ctx.fill();
            
            // Motori laterali (rettangoli con glow)
            const motorWidth = 6;
            const motorHeight = 10;
            
            // Motore sinistro
            ctx.fillStyle = '#ffaa00'; // Arancione fuoco
            ctx.fillRect(player.x + 5, player.y + player.height - 12, motorWidth, motorHeight);
            ctx.strokeStyle = '#ffff00';
            ctx.lineWidth = 1;
            ctx.strokeRect(player.x + 5, player.y + player.height - 12, motorWidth, motorHeight);
            
            // Motore destro
            ctx.fillStyle = '#ffaa00';
            ctx.fillRect(player.x + player.width - 11, player.y + player.height - 12, motorWidth, motorHeight);
            ctx.strokeStyle = '#ffff00';
            ctx.strokeRect(player.x + player.width - 11, player.y + player.height - 12, motorWidth, motorHeight);
            
            // Antenna in alto con effetto pulsante
            const pulseIntensity = Math.sin(Date.now() / 100) * 2 + 3;
            ctx.strokeStyle = hexToRgba('#0f0', 0.8);
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(centerX, player.y);
            ctx.lineTo(centerX, player.y - 12 - pulseIntensity);
            ctx.stroke();
            
            // Punta dell'antenna
            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.arc(centerX, player.y - 12 - pulseIntensity, 2, 0, Math.PI * 2);
            ctx.fill();
        }

        // Disegna i proiettili
        function drawBullets() {
            ctx.fillStyle = '#0f0';
            for (let bullet of playerBullets) {
                ctx.beginPath();
                ctx.moveTo(bullet.x, bullet.y + bulletHeight);
                ctx.lineTo(bullet.x + bulletWidth/2, bullet.y);
                ctx.lineTo(bullet.x + bulletWidth, bullet.y + bulletHeight);
                ctx.closePath();
                ctx.fill();
            }
            
            ctx.fillStyle = '#f00';
            for (let bullet of enemyBullets) {
                ctx.beginPath();
                ctx.moveTo(bullet.x, bullet.y);
                ctx.lineTo(bullet.x + enemyBulletWidth/2, bullet.y + enemyBulletHeight);
                ctx.lineTo(bullet.x + enemyBulletWidth, bullet.y);
                ctx.closePath();
                ctx.fill();
            }
        }

        // Gestione nave bonus
        function spawnBonusShip() {
            if (bonusShip === null && gameRunning && !isPlayerExploding) {
                bonusShip = {
                    x: -60, // inizia fuori schermo a sinistra
                    y: 20, // in alto
                    width: 50,
                    height: 25,
                    speed: 3,
                    lastShot: 0,
                    bonusPoints: Math.round((500 + Math.random() * 1000) / 10) * 10 // multiplo di 10 tra 500-1500
                };
                console.log('Bonus ship spawned with', bonusShip.bonusPoints, 'points');
            }
        }

        function drawBonusShip() {
            if (bonusShip === null) return;

            const centerX = bonusShip.x + bonusShip.width / 2;
            const centerY = bonusShip.y + bonusShip.height / 2;
            
            // Effetto glow intorno alla nave bonus (più intenso del giocatore)
            const bonusGlowGradient = ctx.createRadialGradient(
                centerX, centerY, 8,
                centerX, centerY, 50
            );
            bonusGlowGradient.addColorStop(0, hexToRgba('#ffff00', 0.4));
            bonusGlowGradient.addColorStop(0.5, hexToRgba('#ffa500', 0.15));
            bonusGlowGradient.addColorStop(1, hexToRgba('#ff6600', 0));
            
            ctx.fillStyle = bonusGlowGradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 50, 0, Math.PI * 2);
            ctx.fill();
            
            // Corpo principale esagonale futuristico
            ctx.fillStyle = '#ffff00'; // Giallo brillante
            ctx.beginPath();
            const size = bonusShip.width / 2.5;
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i;
                const x = centerX + Math.cos(angle) * size;
                const y = centerY + Math.sin(angle) * size;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();
            
            // Bordo luminoso triplo (tripla protezione!)
            ctx.strokeStyle = '#ffff00';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            ctx.strokeStyle = '#ffa500';
            ctx.lineWidth = 1;
            ctx.stroke();
            
            // Cabina centrale esagonale (finestra)
            ctx.fillStyle = '#87ceeb'; // Azzurro cielo
            const innerSize = size * 0.5;
            ctx.beginPath();
            for (let i = 0; i < 6; i++) {
                const angle = (Math.PI / 3) * i;
                const x = centerX + Math.cos(angle) * innerSize;
                const y = centerY + Math.sin(angle) * innerSize;
                if (i === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.closePath();
            ctx.fill();
            
            // Pupilla della cabina
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(centerX, centerY, 3, 0, Math.PI * 2);
            ctx.fill();
            
            // Propulsori angolari (3 motori)
            const motorColor = '#ff3333'; // Rosso fuoco più aggressivo
            const motorGlow = hexToRgba('#ff6600', 0.6);
            
            for (let i = 0; i < 3; i++) {
                const angle = (Math.PI * 2 / 3) * i + Math.PI / 2;
                const motorX = centerX + Math.cos(angle) * (size + 8);
                const motorY = centerY + Math.sin(angle) * (size + 8);
                
                // Glow motore
                const motorGlowGrad = ctx.createRadialGradient(
                    motorX, motorY, 0,
                    motorX, motorY, 8
                );
                motorGlowGrad.addColorStop(0, motorGlow);
                motorGlowGrad.addColorStop(1, motorGlow.replace('0.6', '0'));
                ctx.fillStyle = motorGlowGrad;
                ctx.beginPath();
                ctx.arc(motorX, motorY, 8, 0, Math.PI * 2);
                ctx.fill();
                
                // Motore centrale
                ctx.fillStyle = motorColor;
                ctx.beginPath();
                ctx.arc(motorX, motorY, 4, 0, Math.PI * 2);
                ctx.fill();
                
                // Contorno motore
                ctx.strokeStyle = '#ffaa00';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }
            
            // Ali laterali decorative con effetto pulsante
            const wingPulse = Math.sin(Date.now() / 200) * 2;
            ctx.fillStyle = hexToRgba('#ffa500', 0.7);
            
            // Ala sinistra
            ctx.beginPath();
            ctx.moveTo(bonusShip.x - 3 - wingPulse, centerY - 5);
            ctx.lineTo(bonusShip.x - 8 - wingPulse, centerY);
            ctx.lineTo(bonusShip.x - 3 - wingPulse, centerY + 5);
            ctx.closePath();
            ctx.fill();
            
            // Ala destra
            ctx.beginPath();
            ctx.moveTo(bonusShip.x + bonusShip.width + 3 + wingPulse, centerY - 5);
            ctx.lineTo(bonusShip.x + bonusShip.width + 8 + wingPulse, centerY);
            ctx.lineTo(bonusShip.x + bonusShip.width + 3 + wingPulse, centerY + 5);
            ctx.closePath();
            ctx.fill();
            
            // Contorno ali
            ctx.strokeStyle = '#ff6600';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        function moveBonusShip() {
            if (bonusShip === null) return;

            bonusShip.x += bonusShip.speed;

            // Sparo casuale - ridotto per evitare accumulo di proiettili
            if (Math.random() < 0.008 && Date.now() - bonusShip.lastShot > 1200) { // 0.8% probabilità ogni frame, minimo 1200ms tra spari
                enemyBullets.push({
                    x: bonusShip.x + bonusShip.width/2 - enemyBulletWidth/2,
                    y: bonusShip.y + bonusShip.height,
                    width: enemyBulletWidth,
                    height: enemyBulletHeight
                });
                sounds.enemyShoot();
                bonusShip.lastShot = Date.now();
            }

            // Rimuovi quando esce dallo schermo
            if (bonusShip.x > canvas.width) {
                bonusShip = null;
            }
        }

        function drawBonusScore() {
            if (bonusScoreDisplay === null) return;

            const now = Date.now();
            const elapsed = now - bonusScoreDisplay.startTime;
            const progress = elapsed / bonusScoreDisplay.duration;

            if (progress >= 1) {
                bonusScoreDisplay = null;
                return;
            }

            // Fade out
            const alpha = 1 - progress;
            ctx.fillStyle = `rgba(255, 255, 0, ${alpha})`;
            ctx.font = 'bold 24px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#ff0';
            ctx.shadowBlur = 10;
            ctx.fillText(`+${bonusScoreDisplay.score}`, bonusScoreDisplay.x, bonusScoreDisplay.y);
            ctx.shadowBlur = 0;
        }

        // Funzione helper per convertire hex color a rgba
        function hexToRgba(hex, alpha) {
            // Espandi colori a 3 cifre (#f00 -> #ff0000)
            let expandedHex = hex;
            if (hex.length === 4) {
                expandedHex = '#' + hex[1] + hex[1] + hex[2] + hex[2] + hex[3] + hex[3];
            }
            
            const r = parseInt(expandedHex.slice(1, 3), 16);
            const g = parseInt(expandedHex.slice(3, 5), 16);
            const b = parseInt(expandedHex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // Disegna i nemici
        function drawEnemies() {
            for (let enemy of enemies) {
                // Disegna l'aura di glow sfumata intorno al nemico
                const centerX = enemy.x + enemy.width/2;
                const centerY = enemy.y + enemy.height/2;
                const glowGradient = ctx.createRadialGradient(
                    centerX, centerY, enemy.width/2,
                    centerX, centerY, enemy.width/2 + 15
                );
                glowGradient.addColorStop(0, hexToRgba(enemy.color, 0.25));
                glowGradient.addColorStop(0.5, hexToRgba(enemy.color, 0.12));
                glowGradient.addColorStop(1, hexToRgba(enemy.color, 0));
                
                ctx.fillStyle = glowGradient;
                ctx.beginPath();
                ctx.ellipse(centerX, centerY, enemy.width/2 + 15, enemy.height/2 + 15, 0, 0, Math.PI * 2);
                ctx.fill();
                
                // Disegna il corpo del nemico
                ctx.fillStyle = enemy.color;
                ctx.beginPath();
                ctx.ellipse(centerX, centerY, enemy.width/2, enemy.height/2, 0, 0, Math.PI * 2);
                ctx.fill();

                // Contorno leggero
                ctx.strokeStyle = hexToRgba(enemy.color, 0.9);
                ctx.lineWidth = 1;
                ctx.stroke();
                
                // Disegna gli occhi
                ctx.fillStyle = '#000';
                if (enemiesMoving) {
                    // Occhi chiusi: linee orizzontali
                    ctx.fillRect(enemy.x + enemy.width/3 - 4, enemy.y + enemy.height/3 - 1, 8, 2);
                    ctx.fillRect(enemy.x + 2*enemy.width/3 - 4, enemy.y + enemy.height/3 - 1, 8, 2);
                } else {
                    // Occhi aperti: cerchi
                    ctx.beginPath();
                    ctx.arc(enemy.x + enemy.width/3, enemy.y + enemy.height/3, 4, 0, Math.PI * 2);
                    ctx.arc(enemy.x + 2*enemy.width/3, enemy.y + enemy.height/3, 4, 0, Math.PI * 2);
                    ctx.fill();
                }
                
                // Disegna la bocca
                ctx.beginPath();
                if (enemy.isShooting) {
                    // Bocca aperta quando spara: arco più grande
                    ctx.arc(enemy.x + enemy.width/2, enemy.y + 2*enemy.height/3, 10, 0, Math.PI);
                } else {
                    // Bocca normale: arco più piccolo
                    ctx.arc(enemy.x + enemy.width/2, enemy.y + 2*enemy.height/3, 4, 0, Math.PI);
                }
                ctx.fill();
            }
        }

        // Disegna le barriere
        function drawBarriers() {
            ctx.fillStyle = '#0af';
            for (let barrier of barriers) {
                for (let block of barrier.blocks) {
                    if (block.active) {
                        ctx.fillRect(barrier.x + block.x, barrier.y + block.y, block.width, block.height);
                    }
                }
            }
        }

        // Muovi i proiettili
        function moveBullets() {
            const now = Date.now();
            
            for (let i = playerBullets.length - 1; i >= 0; i--) {
                playerBullets[i].y -= bulletSpeed;
                if (playerBullets[i].y < 0) {
                    playerBullets.splice(i, 1);
                }
            }
            
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                enemyBullets[i].y += enemyBulletSpeed;
                if (enemyBullets[i].y > canvas.height) {
                    enemyBullets.splice(i, 1);
                }
            }
            
            // Pulizia se i proiettili superano il limite massimo
            if (enemyBullets.length > maxEnemyBullets) {
                enemyBullets.splice(0, enemyBullets.length - maxEnemyBullets);
            }
            
            if (now - lastEnemyShot > enemyShotInterval && enemies.length > 0) {
                const shooter = enemies[Math.floor(Math.random() * enemies.length)];
                enemyBullets.push({
                    x: shooter.x + shooter.width/2 - enemyBulletWidth/2,
                    y: shooter.y + shooter.height,
                    width: enemyBulletWidth,
                    height: enemyBulletHeight
                });
                // Attiva animazione bocca aperta per il nemico che spara
                shooter.isShooting = true;
                shooter.shootingEndTime = now + 300; // bocca aperta per 300ms
                // adattamento del suono nemico per assomigliare di più al player
                sounds.enemyShoot();
                lastEnemyShot = now;
                enemyShotInterval = Math.max(500, 1500 - score / 10);
            }
        }

        // Muovi i nemici
        function moveEnemies() {
            enemyMoveTimer++;
            if (enemyMoveTimer >= enemyMoveInterval) {
                enemyMoveTimer = 0;
                
                let moveDown = false;
                for (let enemy of enemies) {
                    enemy.x += enemySpeed * enemyDirection;
                    
                    if (enemy.x <= 0 || enemy.x + enemy.width >= canvas.width) {
                        moveDown = true;
                    }
                    
                    if (enemy.y + enemy.height >= player.y) {
                        gameOver();
                        return;
                    }
                }
                
                if (moveDown) {
                    enemyDirection *= -1;
                    // Inizia animazione occhi chiusi quando cambiano direzione
                    enemiesMoving = true;
                    enemiesMovingEndTime = Date.now() + 200; // occhi chiusi per 200ms
                    for (let enemy of enemies) {
                        enemy.y += 20;
                    }
                    // Calcola quanti nemici sono stati eliminati e passa il parametro
                    const enemiesEliminated = totalEnemies - enemies.length;
                    sounds.move(enemiesEliminated);
                }
            }
            
            // Aggiorna stati animazione
            const now = Date.now();
            if (enemiesMoving && now > enemiesMovingEndTime) {
                enemiesMoving = false;
            }
            
            // Aggiorna animazioni bocca nemici
            for (let enemy of enemies) {
                if (enemy.isShooting && now > enemy.shootingEndTime) {
                    enemy.isShooting = false;
                }
            }
        }

        // Controlla le collisioni
        function checkCollisions() {
            const now = Date.now();
            
            for (let i = playerBullets.length - 1; i >= 0; i--) {
                for (let j = enemies.length - 1; j >= 0; j--) {
                    if (playerBullets[i].x < enemies[j].x + enemies[j].width &&
                        playerBullets[i].x + bulletWidth > enemies[j].x &&
                        playerBullets[i].y < enemies[j].y + enemies[j].height &&
                        playerBullets[i].y + bulletHeight > enemies[j].y) {
                        
                        playerBullets.splice(i, 1);
                        // Attiva esplosione del nemico
                        triggerEnemyExplosion(enemies[j].x + enemies[j].width/2, enemies[j].y + enemies[j].height/2);
                        score += enemies[j].points;
                        enemies.splice(j, 1);
                        sounds.explosion();
                        scoreElement.textContent = `SCORE: ${score.toString().padStart(4, '0')}`;
                        break;
                    }
                }

                // Controlla collisione con nave bonus (solo se il proiettile non è stato già rimosso)
                if (playerBullets[i] && bonusShip !== null &&
                    playerBullets[i].x < bonusShip.x + bonusShip.width &&
                    playerBullets[i].x + bulletWidth > bonusShip.x &&
                    playerBullets[i].y < bonusShip.y + bonusShip.height &&
                    playerBullets[i].y + bulletHeight > bonusShip.y) {

                    playerBullets.splice(i, 1);
                    // Attiva esplosione della nave bonus
                    triggerEnemyExplosion(bonusShip.x + bonusShip.width/2, bonusShip.y + bonusShip.height/2);
                    // Mostra punteggio bonus
                    bonusScoreDisplay = {
                        x: bonusShip.x + bonusShip.width/2,
                        y: bonusShip.y + bonusShip.height/2,
                        score: bonusShip.bonusPoints,
                        startTime: Date.now(),
                        duration: 2000 // 2 secondi
                    };
                    score += bonusShip.bonusPoints;
                    scoreElement.textContent = `SCORE: ${score.toString().padStart(4, '0')}`;
                    sounds.explosion();
                    bonusShip = null;
                    break;
                }
            }
            
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                if (enemyBullets[i].x < player.x + player.width &&
                    enemyBullets[i].x + enemyBulletWidth > player.x &&
                    enemyBullets[i].y < player.y + player.height &&
                    enemyBullets[i].y + enemyBulletHeight > player.y) {
                    
                    enemyBullets.splice(i, 1);
                    lives--;
                    sounds.hit();
                    updateLivesDisplay();

                    if (lives <= 0) {
                        triggerPlayerExplosion(true);
                    } else {
                        triggerPlayerExplosion(false);
                    }
                    break;
                }
            }
            
            checkBarrierCollisions();
        }

        // Controlla collisioni con le barriere
        function checkBarrierCollisions() {
            for (let barrier of barriers) {
                for (let block of barrier.blocks) {
                    if (!block.active) continue;
                    
                    for (let i = playerBullets.length - 1; i >= 0; i--) {
                        if (playerBullets[i].x < barrier.x + block.x + block.width &&
                            playerBullets[i].x + bulletWidth > barrier.x + block.x &&
                            playerBullets[i].y < barrier.y + block.y + block.height &&
                            playerBullets[i].y + bulletHeight > barrier.y + block.y) {
                            
                            playerBullets.splice(i, 1);
                            block.active = false;
                            sounds.hit();
                            break;
                        }
                    }
                    
                    for (let i = enemyBullets.length - 1; i >= 0; i--) {
                        if (enemyBullets[i].x < barrier.x + block.x + block.width &&
                            enemyBullets[i].x + enemyBulletWidth > barrier.x + block.x &&
                            enemyBullets[i].y < barrier.y + block.y + block.height &&
                            enemyBullets[i].y + enemyBulletHeight > barrier.y + block.y) {
                            
                            enemyBullets.splice(i, 1);
                            block.active = false;
                            sounds.hit();
                            break;
                        }
                    }
                }
            }
        }

        // Aggiorna display vite
        function updateLivesDisplay() {
            let hearts = '';
            for (let i = 0; i < lives; i++) {
                hearts += '❤';
            }
            // Usa uno spazio fisso per evitare che l'elemento si muova durante l'aggiornamento
            const maxHearts = 3;
            const emptyHearts = maxHearts - lives;
            hearts += ' '.repeat(emptyHearts);
            livesElement.textContent = `LIVES: ${hearts}`;
        }

        function resetPlayerAfterHit() {
            isPlayerExploding = false;
            isFinalExplosion = false;
            playerExplosionRadius = 0;
            player.x = canvas.width / 2 - 25;
            player.lastShot = 0;
            playerBullets.length = 0;
            enemyBullets.length = 0;
            if (lives > 0) {
                gameRunning = true;
            }
        }

        function triggerPlayerExplosion(finalExplosion = false) {
            if (isPlayerExploding) return;
            isPlayerExploding = true;
            isFinalExplosion = finalExplosion;
            playerExplosionEnd = Date.now() + (finalExplosion ? 1600 : 700);
            playerExplosionRadius = 0;
            sounds.explosion();
            gameRunning = false;
        }

        function drawPlayerExplosion() {
            const cx = player.x + player.width / 2;
            const cy = player.y + player.height / 2;
            const radius = playerExplosionRadius;
            const gradient = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
            gradient.addColorStop(0, 'rgba(255,255,50,1)');
            gradient.addColorStop(0.4, 'rgba(255,120,0,0.9)');
            gradient.addColorStop(0.8, 'rgba(255,0,0,0.6)');
            gradient.addColorStop(1, 'rgba(0,0,0,0)');

            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(cx, cy, radius, 0, Math.PI * 2);
            ctx.fill();
            if (playerExplosionRadius < 120) {
                playerExplosionRadius += 3;
            }
        }

        function triggerEnemyExplosion(x, y) {
            if (enemyExplosions.length < maxEnemyExplosions) {
                enemyExplosions.push({
                    x: x,
                    y: y,
                    startTime: Date.now(),
                    duration: 400, // durata più breve dell'esplosione del giocatore
                    radius: 0,
                    maxRadius: 25 // raggio più piccolo
                });
            }
        }

        function drawEnemyExplosions() {
            const now = Date.now();
            for (let i = enemyExplosions.length - 1; i >= 0; i--) {
                const explosion = enemyExplosions[i];
                const elapsed = now - explosion.startTime;
                const progress = elapsed / explosion.duration;

                if (progress >= 1) {
                    enemyExplosions.splice(i, 1);
                    continue;
                }

                // Calcola il raggio attuale (cresce e poi diminuisce)
                let radius;
                if (progress < 0.5) {
                    radius = (progress / 0.5) * explosion.maxRadius;
                } else {
                    radius = explosion.maxRadius * (1 - (progress - 0.5) / 0.5);
                }

                const gradient = ctx.createRadialGradient(
                    explosion.x, explosion.y, 0,
                    explosion.x, explosion.y, radius
                );
                gradient.addColorStop(0, 'rgba(255,255,100,0.9)');
                gradient.addColorStop(0.4, 'rgba(255,150,0,0.7)');
                gradient.addColorStop(0.8, 'rgba(255,50,0,0.4)');
                gradient.addColorStop(1, 'rgba(0,0,0,0)');

                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(explosion.x, explosion.y, radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Sparo del giocatore
        function shoot() {
            const now = Date.now();
            if (now - player.lastShot > player.shotDelay) {
                playerBullets.push({
                    x: player.x + player.width / 2 - bulletWidth / 2,
                    y: player.y,
                    width: bulletWidth,
                    height: bulletHeight
                });
                sounds.shoot();
                player.lastShot = now;
            }
        }

        // Game over
        function gameOver() {
            gameRunning = false;
            gameOverElement.style.display = 'block';
            cancelAnimationFrame(animationId);
        }

        // MOVIMENTO DEL GIOCATORE
        function handlePlayerMovement() {
            const now = Date.now();
            let moved = false;
            
            // Controlla se i tasti sono premuti
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) {
                if (player.x > 0) {
                    player.x -= player.speed;
                    moved = true;
                }
            }
            if (keys['ArrowRight'] || keys['d'] || keys['D']) {
                if (player.x + player.width < canvas.width) {
                    player.x += player.speed;
                    moved = true;
                }
            }
            
            if (moved && now - lastMoveSound > 100) {
                sounds.move();
                lastMoveSound = now;
            }
        }

        // Loop principale del gioco
        function gameLoop() {
            // Pulisci il canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Disegna lo sfondo stellato
            drawStars();

            if (isPlayerExploding) {
                drawPlayerExplosion();

                if (Date.now() >= playerExplosionEnd) {
                    if (isFinalExplosion) {
                        gameOver();
                        return;
                    } else {
                        resetPlayerAfterHit();
                    }
                }

                animationId = requestAnimationFrame(gameLoop);
                return;
            }

            if (!gameRunning) {
                animationId = requestAnimationFrame(gameLoop);
                return;
            }

            // AGGIORNA IL MOVIMENTO DEL GIOCATORE QUI
            handlePlayerMovement();

            // Disegna e muovi gli elementi
            drawBarriers();
            drawPlayer();
            drawBonusShip();
            drawBullets();
            drawEnemies();
            drawEnemyExplosions();
            drawBonusScore();
            
            // Mostra FPS se abilitato
            if (fpsEnabled) {
                const now = performance.now();
                const deltaTime = now - lastFrameTime;
                if (deltaTime > 0) {
                    const instantFps = 1000 / deltaTime;
                    fpsHistory.push(instantFps);
                    if (fpsHistory.length > fpsHistorySize) {
                        fpsHistory.shift();
                    }
                    fpsValue = fpsHistory.reduce((a, b) => a + b, 0) / fpsHistory.length;
                }
                lastFrameTime = now;

                ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
                ctx.fillRect(canvas.width - 110, 8, 100, 24);
                ctx.fillStyle = '#0f0';
                ctx.font = '16px Courier New';
                ctx.textAlign = 'right';
                ctx.textBaseline = 'top';
                ctx.fillText(`FPS: ${Math.round(fpsValue)}`, canvas.width - 12, 10);
            } else {
                lastFrameTime = performance.now();
            }

            moveBullets();
            moveEnemies();
            moveBonusShip();
            checkCollisions();

            // DEBUG: Logging degli array per tracciare accumuli
            if (Math.floor(Date.now() / 1000) % 2 === 0) {
                console.log(`Bullets: ${playerBullets.length} | Enemy Bullets: ${enemyBullets.length} | Explosions: ${enemyExplosions.length} | Enemies: ${enemies.length} | Bonus: ${bonusShip !== null ? 'Yes' : 'No'}`);
            }

            // Spawn nave bonus occasionalmente
            bonusShipSpawnTimer++;
            if (bonusShipSpawnTimer >= bonusShipSpawnInterval && bonusShip === null) {
                spawnBonusShip();
                bonusShipSpawnTimer = 0;
                bonusShipSpawnInterval = 180 + Math.random() * 300; // 3-8 secondi a 60fps
            }

            // Aumenta velocità man mano che i nemici vengono eliminati nel livello corrente
            // La velocità base aumenta ad ogni livello completato
            const baseSpeed = 0.8 + (level - 1) * 0.1;
            if (enemies.length < totalEnemies) {
                const enemiesEliminated = totalEnemies - enemies.length;
                enemySpeed = baseSpeed + (enemiesEliminated * 0.2);
            } else {
                enemySpeed = baseSpeed;
            }

            if (enemies.length === 0) {
                level++;
                levelElement.textContent = `LEVEL: ${level.toString().padStart(2, '0')}`;
                initEnemies();
                enemyShotInterval = Math.max(300, 1000 - score / 20);
                // Aumenta leggermente la velocità base ad ogni livello
                enemySpeed = 0.8 + (level - 1) * 0.1;
            }

            animationId = requestAnimationFrame(gameLoop);
        }

        // Disegna stelle nello sfondo
        function drawStars() {
        	if (!starsEnabled) return;
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 50; i++) {
                const x = (Math.sin(i * 100) * canvas.width/2 + canvas.width/2) % canvas.width;
                const y = (i * 15 + Date.now() / 50) % canvas.height;
                const size = Math.sin(Date.now() / 1000 + i) * 1.5 + 1.5;
                ctx.beginPath();
                ctx.arc(x, y, size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Disegna GAME OVER al centro del canvas
        function drawGameOver() {
            // Sfondo semi-trasparente
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Testo GAME OVER al centro
            ctx.fillStyle = '#f00';
            ctx.font = 'bold 80px "Courier New", monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#f00';
            ctx.shadowBlur = 30;
            ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
            ctx.shadowBlur = 0;
        }

        // CONTROLLI DA TASTIERA - QUESTA È LA PARTE IMPORTANTE
        window.addEventListener('keydown', (e) => {
            keys[e.key] = true;
            if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) {
                e.preventDefault();
            }
            
            // Avvia il gioco con il tasto 's'
            if ((e.key === 's' || e.key === 'S') && !gameRunning) {
                gameOverElement.style.display = 'none';
                isPlayerExploding = false;
                isFinalExplosion = false;
                gameRunning = true;
                score = 0;
                level = 1;
                lives = 3;
                enemySpeed = 0.8;
                enemyShotInterval = 1000;
                scoreElement.textContent = `SCORE: 0000`;
                levelElement.textContent = `LEVEL: 01`;
                updateLivesDisplay();
                initEnemies();
                initBarriers();
                playerBullets.length = 0;
                enemyBullets.length = 0;
                player.x = canvas.width / 2 - 25;
                player.lastShot = 0;
                
                // Reset stati animazione nemici
                enemiesMoving = false;
                enemiesMovingEndTime = 0;
                enemyExplosions.length = 0; // Reset esplosioni nemici
                bonusShip = null; // Reset nave bonus
                bonusShipSpawnTimer = 0;
                bonusScoreDisplay = null; // Reset display punteggio bonus
                initStars(); // Ricalcola le stelle quando riparte il gioco
                
                // Avvia l'audio context se necessario
                if (audioContext && audioContext.state === 'suspended') {
                    audioContext.resume();
                }
                
                gameLoop();
            }
            
            // Attiva/disattiva stelle con 'F'
            if (e.key === 'f' || e.key === 'F') {
                starsEnabled = !starsEnabled;
            }

            // Attiva/disattiva FPS con 'P'
            if (e.key === 'p' || e.key === 'P') {
                fpsEnabled = !fpsEnabled;
            }

            // Debug: spawn nave bonus con tasto 'B'
            if ((e.key === 'b' || e.key === 'B') && gameRunning && bonusShip === null) {
                spawnBonusShip();
                bonusShipSpawnTimer = 0;
                bonusShipSpawnInterval = 180 + Math.random() * 300;
            }
            
            if (e.key === ' ' && gameRunning) {
                shoot();
                e.preventDefault();
            }
            
            // Debug: mostra i tasti premuti (disabilitato per stabilità)
            // console.log('Key pressed:', e.key, 'keys:', keys);
        });
        
        window.addEventListener('keyup', (e) => {
            keys[e.key] = false;
            // console.log('Key released:', e.key);
        });

        // Inizializzazione del gioco - attendi il tasto 's'
        initStars();
        initEnemies();
        initBarriers();
        
        // Avvia il loop di rendering
        gameLoop();

        // Attiva l'audio context al primo click
        document.addEventListener('click', () => {
            if (audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
            canvas.focus();
        }, { once: true });

        // Impedisci al browser di spostare il cursore di testo sulle etichette durante i comandi
        document.addEventListener('keydown', (e) => {
            if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
