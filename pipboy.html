<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Pip-Boy JS</title>
<style>
body {
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: "Courier New", monospace;
}

#pipboy {
    width: 800px;
    height: 500px;
    background: #001100;
    color: #33ff33;
    border: 8px solid #0f0;
    box-shadow: 0 0 40px #0f0;
    position: relative;
    overflow: hidden;
}

.scanlines {
    position: absolute;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        to bottom,
        rgba(0,255,0,0.05),
        rgba(0,255,0,0.05) 2px,
        transparent 2px,
        transparent 4px
    );
    pointer-events: none;
}

header {
    display: flex;
    justify-content: space-between;
    padding: 10px;
    border-bottom: 2px solid #0f0;
}

nav {
    display: flex;
    justify-content: space-around;
    border-bottom: 2px solid #0f0;
}

nav button {
    background: none;
    border: none;
    color: #33ff33;
    font-size: 18px;
    padding: 10px;
    cursor: pointer;
}

nav button.active {
    background: #003300;
}

.section {
    display: none;
    padding: 20px;
    height: 360px;
    overflow-y: auto;
}

.section.active {
    display: block;
}

#inventory li {
    cursor: pointer;
}

canvas {
    background: #002200;
    border: 2px solid #0f0;
}
</style>
</head>
<body>

<div id="pipboy">
    <header>
        <div>PIP-BOY 3000 Mk IV</div>
        <div id="clock"></div>
    </header>

    <nav>
        <button onclick="showTab('stat')" class="active">STAT</button>
        <button onclick="showTab('inv')">INV</button>
        <button onclick="showTab('data')">DATA</button>
        <button onclick="showTab('map')">MAP</button>
        <button onclick="showTab('radio')">RADIO</button>
    </nav>

    <div id="stat" class="section active">
        <h2>STATISTICHE</h2>
        <p>Salute: 85%</p>
        <p>Livello: 12</p>
        <p>Radiazioni: 10%</p>
        <p>Forza: 6 | Percezione: 5 | Resistenza: 7</p>
    </div>

    <div id="inv" class="section">
        <h2>INVENTARIO</h2>
        <ul id="inventory">
            <li onclick="showItem(this)">🔫 Pistola 10mm</li>
            <li onclick="showItem(this)">💉 Stimpak</li>
            <li onclick="showItem(this)">🍖 Carne Mutante</li>
        </ul>
        <p id="itemDesc"></p>
    </div>

    <div id="data" class="section">
        <h2>MISSIONI</h2>
        <p>✔ Trova il Rifugio 111</p>
        <p>☐ Esplora la Zona Radioattiva</p>
    </div>

    <div id="map" class="section">
        <h2>MAPPA</h2>
        <canvas id="mapCanvas" width="500" height="250"></canvas>
    </div>

    <div id="radio" class="section">
        <h2>RADIO</h2>
        <button onclick="playStation('Diamond City Radio')">Diamond City Radio</button>
        <button onclick="playStation('Classical Radio')">Classical Radio</button>
        <p id="radioStatus">Nessuna stazione selezionata</p>
    </div>

    <div class="scanlines"></div>
</div>

<script>
function showTab(tabId) {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));

    document.getElementById(tabId).classList.add("active");
    event.target.classList.add("active");
}

function updateClock() {
    const now = new Date();
    document.getElementById("clock").textContent =
        now.toLocaleTimeString();
}
setInterval(updateClock, 1000);
updateClock();

function showItem(item) {
    document.getElementById("itemDesc").textContent =
        "Hai selezionato: " + item.textContent;
}

function playStation(name) {
    document.getElementById("radioStatus").textContent =
        "Riproduzione: " + name;
}

// Mini mappa simulata
const canvas = document.getElementById("mapCanvas");
const ctx = canvas.getContext("2d");

ctx.fillStyle = "#00ff00";
ctx.fillRect(240, 120, 10, 10); // player

ctx.strokeStyle = "#00ff00";
ctx.strokeRect(50, 50, 100, 80);
ctx.strokeRect(300, 150, 120, 60);
</script>

</body>
</html>
