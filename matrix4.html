<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Matrix Cinematic</title>
<style>
  body {
    margin: 0;
    overflow: hidden;
    background: black;
  }
  canvas {
    display: block;
  }
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Katakana reali + numeri
const katakana = 
"アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホ" +
"マミムメモヤユヨラリルレロワヲン0123456789";

const chars = katakana.split("");

const fontSize = 20;
let columns = Math.floor(canvas.width / fontSize);

// Ogni colonna ha proprietà proprie (velocità, lunghezza, ecc.)
let streams = [];

function init() {
  streams = [];
  columns = Math.floor(canvas.width / fontSize);

  for (let i = 0; i < columns; i++) {
    streams.push({
      x: i * fontSize,
      y: Math.random() * -1000,
      speed: 20 + Math.random() * 4,
      length: 10 + Math.random() * 30
    });
  }
}

init();

function draw() {

  // Fade cinematografico
  ctx.fillStyle = "rgba(0, 0, 0, 0.08)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.font = fontSize + "px monospace";

  streams.forEach(stream => {

    for (let i = 0; i < stream.length; i++) {

      const char = chars[Math.floor(Math.random() * chars.length)];
      const y = stream.y - (i * fontSize);

      // Testa bianca brillante
      if (i === 0) {
        ctx.fillStyle = "#FFFFFF";
        ctx.shadowColor = "#00FF41";
        ctx.shadowBlur = 25;
      } else {
        ctx.shadowBlur = 0;

        // Gradiente verde realistico
        const opacity = 1 - (i / stream.length);
        ctx.fillStyle = `rgba(0,255,70,${opacity})`;
      }

      ctx.fillText(char, stream.x, y);
    }

    stream.y += stream.speed;

    // Reset realistico
    if (stream.y - stream.length * fontSize > canvas.height) {
      stream.y = Math.random() * -500;
      stream.speed = 2 + Math.random() * 4;
      stream.length = 10 + Math.random() * 30;
    }
  });
}

setInterval(draw, 50);

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  init();
});
</script>

</body>
</html>
