<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Super Mario Bros - by AI</title>
    <style>
        body {
            margin: 0;
            background: #222;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
        }

        #container {
            position: relative;
            width: 800px;
            height: 512px;
        }

        canvas {
            background: #5c94fc;
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .hud {
            position: absolute;
            pointer-events: none;
            text-shadow: 2px 2px 0 #000;
            color: white;
            display: flex;
            width: 100%;
            justify-content: space-around;
            top: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        #controls {
            position: absolute;
            bottom: -40px;
            color: #aaa;
            font-size: 16px;
            text-align: center;
            width: 100%;
        }

        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            display: none;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="container">
        <canvas id="game" width="400" height="256"></canvas>
        <div class="hud">
            <div>
                <div>MARIO</div>
                <div id="score">000000</div>
            </div>
            <div>
                <div>COINS</div>
                <div id="coins">00</div>
            </div>
            <div>
                <div>WORLD</div>
                <div>1-1</div>
            </div>
        </div>
        <div id="message">HAI VINTO!<br><span style="font-size: 16px;">Ricarica la pagina per giocare ancora</span>
        </div>
        <div id="controls">Controlli: FRECCE per muoversi, SPAZIO per saltare. Salta in testa ai nemici!</div>
    </div>

    <script>
        const c = document.getElementById("game");
        const ctx = c.getContext("2d");
        const scoreEl = document.getElementById("score");
        const coinsEl = document.getElementById("coins");
        const messageEl = document.getElementById("message");

        // --- AUDIO SYSTEM ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let actx = null;

        function initAudio() {
            if (!actx) {
                actx = new AudioContext();
            }
            if (actx.state === 'suspended') actx.resume();
        }

        function playTone(freq, type, duration, vol = 0.1, slide = 0) {
            initAudio();
            const osc = actx.createOscillator();
            const gain = actx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, actx.currentTime);
            if (slide !== 0) {
                osc.frequency.exponentialRampToValueAtTime(Math.max(1, freq + slide), actx.currentTime + duration);
            }
            gain.gain.setValueAtTime(vol, actx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, actx.currentTime + duration);
            osc.connect(gain);
            gain.connect(actx.destination);
            osc.start();
            osc.stop(actx.currentTime + duration);
        }

        function sndJump() { playTone(400, 'square', 0.2, 0.05, 200); }
        function sndCoin() { playTone(1200, 'sine', 0.1, 0.05, 500); setTimeout(() => playTone(1600, 'sine', 0.2, 0.05, 0), 100); }
        function sndBump() { playTone(100, 'square', 0.1, 0.05, -50); }
        function sndStomp() { playTone(600, 'square', 0.1, 0.05, -400); }
        function sndKick() { playTone(300, 'square', 0.1, 0.05, -100); }
        function sndDie() {
            playTone(300, 'sawtooth', 0.2, 0.1, -100);
            setTimeout(() => playTone(250, 'sawtooth', 0.2, 0.1, -100), 200);
            setTimeout(() => playTone(200, 'sawtooth', 0.5, 0.1, -100), 400);
        }
        function sndWin() {
            playTone(523.25, 'square', 0.15, 0.1); // C5
            setTimeout(() => playTone(659.25, 'square', 0.15, 0.1), 150); // E5
            setTimeout(() => playTone(783.99, 'square', 0.4, 0.1), 300); // G5
        }

        const colors = {
            ' ': null,
            'r': '#f83800', // red
            'b': '#881400', // brown
            's': '#fca044', // skin
            'o': '#0070ec', // blue
            'y': '#f8b800', // yellow
            'w': '#ffffff', // white
            'k': '#000000', // black
            'c': '#e45c10', // brick bright
            '1': '#c84c0c', // brick dark
            'g': '#00a800', // green
            'f': '#ffffff', // flag
            't': '#00c000' // turtle shell bright
        };

        const spriteData = {
            marioStand: [
                "      rrrrr     ", "     rrrrrrrr   ", "     bbbssbs    ", "    sbsossos    ",
                "    sbsossoss   ", "    sssooos     ", "      ssss      ", "    rrorrrr     ",
                "   rrorrrrro    ", "  rrrrorrrrroo  ", "  ssorrooyorso  ", "  ssorrrrrrrso  ",
                "  oo oooooo oo  ", "     oooooo     ", "    bb    bb    ", "   bbb    bbb   "
            ],
            marioWalk: [
                "      rrrrr     ", "     rrrrrrrr   ", "     bbbssbs    ", "    sbsossos    ",
                "    sbsossoss   ", "    sssooos     ", "      ssss      ", "    rrorrrr     ",
                "   rrrorrrrro   ", "  rrrrorrrrroo  ", "  ssorrooyorso  ", "  ssorrrrrrrso  ",
                "  oo oooooo oo  ", "     oooooo     ", "   bbb    bb    ", "  bbbb          "
            ],
            marioJump: [
                "      rrrrr     ", "     rrrrrrrr   ", "     bbbssbs    ", "    sbsossos    ",
                "    sbsossoss   ", "    sssooos     ", "      ssss      ", "    rrorrrr     ",
                "   rrrorrrrro   ", "  rrrrorrrrroo  ", "  ssorrooyorso  ", "  ssorrrrrrrso  ",
                "  oo oooooo oo  ", "   bb oooo bb   ", "  bbb      bbb  ", "                "
            ],
            marioDead: [
                "                ", "      rrrrr     ", "     rrrrrrrr   ", "     bbbssbs    ",
                "    sbsossos    ", "    sbsossoss   ", "    sssooos     ", "      ssss      ",
                "   bb rrrrr bb  ", "  bbbb rrr bbbb ", "  bbbb rrr bbbb ", "   bb ooooo bb  ",
                "      ooooo     ", "     oo   oo    ", "    oo     oo   ", "                "
            ],
            marioClimb: [
                "      rrrrr     ", "     rrrrrrrr   ", "     bbbssbs    ", "    sbsossos    ",
                "    sbsossoss   ", "    sssooos     ", "      ssss      ", "   oorrrrrroo   ",
                "  orrrrorrrro   ", " oorrrbbbrrrroo ", " ossbbbbbbbssmo ", " ossbbbbbbbssmo ",
                " oooobbbbboooo  ", "    bbbbbbb     ", "  bbbb   bbbb   ", " bbb       bbb  "
            ],
            goombaWalk1: ["                ", "                ", "                ", "      bbbb      ", "     bbbbbb     ", "    bbbbbbbb    ", "   bbbwbbwbbb   ", "  bbbbbkwkbbbb  ", "  bbbbsbbbsbbb  ", "  bbbbsbbbsbbb  ", "   bbbbbbbbbb   ", "    ssbbbbss    ", "   ssssbbssss   ", "   ssss  ssss   ", "  kkkkk  kkkkk  ", "  kkk      kkk  "],
            goombaWalk2: ["                ", "                ", "                ", "      bbbb      ", "     bbbbbb     ", "    bbbbbbbb    ", "   bbbwbbwbbb   ", "  bbbbbkwkbbbb  ", "  bbbbsbbbsbbb  ", "  bbbbsbbbsbbb  ", "   bbbbbbbbbb   ", "    ssbbbbss    ", "   ssssbbssss   ", "   ssss  ssss   ", "   kkk    kkk   ", "  kkk      kkk  "],
            goombaDead: ["                ", "                ", "                ", "                ", "                ", "                ", "                ", "      bbbb      ", "     bbbbbb     ", "    bbbbbbbb    ", "   bbbwbbwbbb   ", "  bbbbbkwkbbbb  ", "  bbbbsbbbsbbb  ", "   bbbbbbbbbb   ", "   ssss  ssss   ", "  kkkkk  kkkkk  "],
            turtleWalk1: ["                ", "                ", "                ", "      wwww      ", "     wtwttw     ", "    wtttwttw    ", "    tttwtttt    ", "   yttwtwttt    ", "  yyyytktttttt  ", "  yyytkkkttttt  ", "    yytkttttt   ", "   syyyyyttt    ", "  sssyyystttt   ", "   sss ssss     ", "   kkk kkk      ", "  kkk kkk       "],
            turtleWalk2: ["                ", "                ", "                ", "      wwww      ", "     wtwttw     ", "    wtttwttw    ", "    tttwtttt    ", "   yttwtwttt    ", "  yyyytktttttt  ", "  yyytkkkttttt  ", "    yytkttttt   ", "   syyyyyttt    ", "  sssyyystttt   ", "   sss ssss     ", "    kkk kkk     ", "   kkk kkk      "],
            turtleShell: ["                ", "                ", "                ", "                ", "                ", "                ", "      wwww      ", "     wtwttw     ", "    wtttwttw    ", "    tttwttttw   ", "   tttwtttttw   ", "   yttwtwtttw   ", "  yyyytktttttt  ", "  ykttkkkttttt  ", "    tgtkttttt   ", "    ggggggg     "],
            cloud: ["                ", "      wwwwwww   ", "    wwwwwwwwwww ", "  wwwwwwwwwwwww ", "  wwwwwwwwwwwww ", "wwwwwwwwwwwwwwww", "wwwwwwwwwwwwwwww", "wwwwwwwwwwwww   ", "                ", "                ", "                ", "                ", "                ", "                ", "                ", "                "],
            brick: ["kkkkkkkkkkkkkkkk", "ccccccccckcccccc", "c11111111k11111c", "c11111111k11111c", "kkkkkkkkkkkkkkkk", "cccckccccccccckc", "c111k111111111kc", "c111k111111111kc", "kkkkkkkkkkkkkkkk", "ccccccccckcccccc", "c11111111k11111c", "c11111111k11111c", "kkkkkkkkkkkkkkkk", "cccckccccccccckc", "c111k111111111kc", "c111k111111111kc"],
            question: ["kkkkkkkkkkkkkkkk", "kyybbbbyybyybbbk", "kybbbybbybyybybk", "kybyyybbybyybybk", "kyyyyybbyyybyybk", "kyyyybbyyybyyybk", "kyyybbyyyyybyybk", "kyyybbyyyybyyybk", "kyyyyyyyybyyyybk", "kyyybbyyybyyyyybk", "kyyybbyyybyyyyyk", "kyyyyycbbyyyyybk", "kyyyyycbbyyyyybk", "kyyyyyyyybyyyyyk", "kyyyyyyyybyybbbk", "kkkkkkkkkkkkkkkk"],
            empty: ["kkkkkkkkkkkkkkkk", "kc111111111111ck", "k1cccccccccccc1k", "k1cccccccccccc1k", "k1cccccccccccc1k", "k1cccccccccccc1k", "k1cccccccccccc1k", "k1cccccccccccc1k", "k1cccccccccccc1k", "k1cccccccccccc1k", "k1cccccccccccc1k", "k1cccccccccccc1k", "k1cccccccccccc1k", "k1cccccccccccc1k", "kc111111111111ck", "kkkkkkkkkkkkkkkk"],
            coin: ["                ", "      yyyy      ", "    yyyccyyy    ", "   yyyccccyyy   ", "   yycbccbcyy   ", "  yycbccccbcyy  ", "  yycbccccbcyy  ", "  yycbccccbcyy  ", "  yycbccccbcyy  ", "  yycbccccbcyy  ", "  yycbccccbcyy  ", "   yycbccbcyy   ", "   yyyccccyyy   ", "    yyyccyyy    ", "      yyyy      ", "                "],
            ground: ["1111111111111111", "1ccccc111ccccc11", "1c111c111c111c11", "1c111c111c111c11", "1ccccc111ccccc11", "1111111111111111", "11ccccc111ccccc1", "11c111c111c111c1", "11c111c111c111c1", "11ccccc111ccccc1", "1111111111111111", "ccc111ccccc111cc", "11c111c111c111c1", "11c111c111c111c1", "ccc111ccccc111cc", "1111111111111111"],
            poleTop: ["      kkkk      ", "     kggggk     ", "    kggggggk    ", "   kggggggggk   ", "   kggggggggk   ", "  kggggggggggk  ", "  kggggggggggk  ", "  kggggggggggk  ", "  kggggggggggk  ", "   kggggggggk   ", "   kggggggggk   ", "    kggggggk    ", "     kggggk     ", "      kkkk      ", "      kggk      ", "      kggk      "],
            pole: ["      kggk      ", "      kggk      ", "      kggk      ", "      kggk      ", "      kggk      ", "      kggk      ", "      kggk      ", "      kggk      ", "      kggk      ", "      kggk      ", "      kggk      ", "      kggk      ", "      kggk      ", "      kggk      ", "      kggk      ", "      kggk      "],
            flag: ["          g     ", "      ggggg     ", "     gggggg     ", "    ggggggg     ", "   gggggggg     ", "  ggggggggg     ", " gggggggggg     ", "ggggggggggg     ", "          g     ", "          g     ", "          g     ", "          g     ", "          g     ", "          g     ", "          g     ", "          g     "]
        };

        const imgs = {};
        for (let name in spriteData) {
            let cvs = document.createElement('canvas');
            cvs.width = 16; cvs.height = 16;
            let cx = cvs.getContext('2d');
            let lines = spriteData[name];
            for (let y = 0; y < 16; y++) {
                for (let x = 0; x < 16; x++) {
                    let col = lines[y][x];
                    if (colors[col]) {
                        cx.fillStyle = colors[col];
                        cx.fillRect(x, y, 1, 1);
                    }
                }
            }
            imgs[name] = cvs;
        }

        const levelDesign = [
            "                                                                                                              ",
            "                                                                                                              ",
            "                                                                                                              ",
            "                                                                                                              ",
            "                                                                                                              ",
            "                                                                                                      T       ",
            "                                                                                                      P       ",
            "               ?                                                                                      P       ",
            "                                     ?                     R                                          P       ",
            "           ?   B?B?B              B                            R             R     E                  P       ",
            "                                                                                                      P       ",
            "                               B  B  B                                 B                              P       ",
            "          R             E                             E      E                                        P       ",
            "GGGGGGGGGGGGGGGGGGGGGGGGGGGG   GGGGGGGGGGGGGGG   GGGGGGGGGGGGGGGG   GGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGG",
            "GGGGGGGGGGGGGGGGGGGGGGGGGGGG   GGGGGGGGGGGGGGG   GGGGGGGGGGGGGGGG   GGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGG",
            "GGGGGGGGGGGGGGGGGGGGGGGGGGGG   GGGGGGGGGGGGGGG   GGGGGGGGGGGGGGGG   GGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGGG"
        ];

        let blocks = [], enemies = [], coins = [], flagData = null;
        let clouds = [];
        let player = { x: 50, y: 50, w: 12, h: 15, vx: 0, vy: 0, speed: 2.2, jump: -6.5, ground: false, dir: 1, dead: false, won: false, climbTimer: 0, score: 0, coins: 0 };
        const gravity = 0.3;
        let camX = 0;

        function resetGame() {
            blocks = []; enemies = []; coins = []; flagData = null; clouds = [];
            player.x = 50; player.y = 50; player.vx = 0; player.vy = 0; player.dead = false; player.won = false;
            player.climbTimer = 0; camX = 0;
            messageEl.style.display = 'none';

            // Generate fewer, static clouds for parallax
            for (let i = 0; i < 8; i++) {
                clouds.push({
                    x: Math.random() * levelDesign[0].length * 16,
                    y: Math.random() * 60 + 10,
                    size: Math.random() * 0.5 + 1.2, // scale factor 1.2 to 1.7
                    layer: Math.random() * 0.3 + 0.1 // depth 0.1 to 0.4
                });
            }

            for (let y = 0; y < levelDesign.length; y++) {
                for (let x = 0; x < levelDesign[y].length; x++) {
                    let t = levelDesign[y][x];
                    if (t === 'G') blocks.push({ x: x * 16, y: y * 16, w: 16, h: 16, type: 'ground', solid: true, yOffset: 0 });
                    if (t === 'B') blocks.push({ x: x * 16, y: y * 16, w: 16, h: 16, type: 'brick', solid: true, yOffset: 0 });
                    if (t === '?') blocks.push({ x: x * 16, y: y * 16, w: 16, h: 16, type: 'question', solid: true, activated: false, yOffset: 0 });
                    if (t === 'C') coins.push({ x: x * 16 + 4, y: y * 16, w: 8, h: 16, pop: false });
                    if (t === 'E') enemies.push({ x: x * 16, y: y * 16, vx: -0.5, vy: 0, w: 16, h: 16, type: 'goomba', state: 'walk', deadTimer: 0 });
                    if (t === 'R') enemies.push({ x: x * 16, y: y * 16, vx: -0.5, vy: 0, w: 16, h: 16, type: 'turtle', state: 'walk', dir: -1 });
                    if (t === 'T') {
                        blocks.push({ x: x * 16, y: y * 16, w: 16, h: 16, type: 'poleTop', solid: false, padding: true });
                        flagData = { x: x * 16 - 8, y: y * 16 + 16, flagY: y * 16 + 16, w: 2, poleX: x * 16 + 8, topY: y * 16 + 16 };
                    }
                    if (t === 'P') {
                        blocks.push({ x: x * 16, y: y * 16, w: 16, h: 16, type: 'pole', solid: false });
                    }
                }
            }
        }

        resetGame();

        const keys = {};
        window.onkeydown = e => { keys[e.code] = true; };
        window.onkeyup = e => { keys[e.code] = false; };

        function hit(a, b) {
            let bw = b.w || 16; let bh = b.h || 16;
            let aw = a.w || 16; let ah = a.h || 16;
            return a.x < b.x + bw && a.x + aw > b.x && a.y < b.y + bh && a.y + ah > b.y;
        }

        // Expanded stomping hitbox logic: player must be falling and player's bottom must be near enemy top
        function isStomping(p, e) {
            return (p.vy > 0 && p.y + p.h - p.vy <= e.y + e.h / 2);
        }

        function bumpBlock(b) {
            if (b.type === 'question' && !b.activated) {
                b.activated = true;
                player.score += 100;
                player.coins++;
                sndCoin();
                b.yOffset = -4;
                coins.push({ x: b.x + 4, y: b.y, w: 8, h: 16, pop: true, vy: -5, startY: b.y - 16 });
            } else if (b.type === 'brick') {
                sndBump();
                b.yOffset = -4;
            }
        }

        function die() {
            if (player.dead) return;
            player.dead = true;
            player.vy = -6;
            player.vx = 0;
            sndDie();
        }

        function winGame() {
            if (player.won) return;
            player.won = true;
            player.vx = 0;
            player.vy = 0;
            player.x = flagData.poleX - player.w / 2;
            sndWin();
            setTimeout(() => {
                messageEl.style.display = 'block';
            }, 2000);
        }

        function update() {

            if (player.won) {
                if (player.y < 12 * 16 - player.h) {
                    player.y += 1.5;
                    player.climbTimer++;
                } else {
                    player.y = 12 * 16 - player.h;
                    player.dir = player.dir === 1 ? -1 : 1;
                }

                if (flagData && flagData.flagY < 12 * 16) {
                    flagData.flagY += 1.5;
                }
                return;
            }

            if (!player.dead) {
                if (keys['ArrowRight']) {
                    player.vx += 0.2;
                    if (player.vx > player.speed) player.vx = player.speed;
                    player.dir = 1;
                } else if (keys['ArrowLeft']) {
                    player.vx -= 0.2;
                    if (player.vx < -player.speed) player.vx = -player.speed;
                    player.dir = -1;
                } else {
                    player.vx *= 0.8;
                    if (Math.abs(player.vx) < 0.1) player.vx = 0;
                }

                if ((keys['Space'] || keys['ArrowUp']) && player.ground) {
                    player.vy = player.jump;
                    player.ground = false;
                    sndJump();
                }

                player.vy += gravity;
                if (player.vy > 7) player.vy = 7;

                player.x += player.vx;
                for (let b of blocks) {
                    if (b.solid && hit(player, b)) {
                        if (player.vx > 0) { player.x = b.x - player.w; player.vx = 0; }
                        else if (player.vx < 0) { player.x = b.x + b.w; player.vx = 0; }
                    }
                }

                if (flagData && player.x + player.w >= flagData.poleX - 4 && player.x <= flagData.poleX + 4 && player.y < 14 * 16) {
                    winGame();
                }

                player.y += player.vy;
                player.ground = false;
                for (let b of blocks) {
                    if (b.solid && hit(player, b)) {
                        if (player.vy > 0) {
                            player.y = b.y - player.h;
                            player.vy = 0;
                            player.ground = true;
                        } else if (player.vy < 0) {
                            player.y = b.y + b.h;
                            player.vy = 0;
                            bumpBlock(b);
                        }
                    }
                }

                if (player.y > 256) die();
            } else {
                player.y += player.vy;
                player.vy += gravity;
            }

            for (let b of blocks) {
                if (b.solid && b.yOffset < 0) b.yOffset += 0.5;
            }

            for (let e of enemies) {
                if (e.state === 'dead' && e.deadTimer === 0) continue;
                if (e.state === 'dead' && e.deadTimer > 0) {
                    e.deadTimer--;
                    continue;
                }

                e.vy += gravity;
                if (e.vy > 7) e.vy = 7;

                // Move X
                e.x += e.vx;
                for (let b of blocks) {
                    if (b.solid && hit(e, b)) {
                        if (e.vx > 0) { e.x = b.x - e.w; e.vx *= -1; e.dir = -1; }
                        else if (e.vx < 0) { e.x = b.x + b.w; e.vx *= -1; e.dir = 1; }
                    }
                }

                // Check collision with OTHER enemies (shell hitting enemies)
                if (e.state === 'shell_moving') {
                    for (let otherE of enemies) {
                        if (otherE !== e && otherE.state !== 'dead' && hit(e, otherE)) {
                            // Shell kills other enemy
                            otherE.state = 'dead';
                            otherE.deadTimer = 1;
                            otherE.y += 200; // Poof away
                            sndKick();
                            player.score += 200;
                        }
                    }
                }

                // Move Y
                e.y += e.vy;
                for (let b of blocks) {
                    if (b.solid && hit(e, b)) {
                        if (e.vy > 0) { e.y = b.y - e.h; e.vy = 0; }
                    }
                }

                if (e.y > 300) { e.state = 'dead'; e.deadTimer = 0; }

                if (hit(player, e) && !player.dead && !player.won) {

                    if (e.type === 'goomba') {
                        if (isStomping(player, e)) {
                            e.state = 'dead';
                            e.deadTimer = 30;
                            player.vy = -5;
                            player.score += 100;
                            sndStomp();
                        } else {
                            die();
                        }
                    } else if (e.type === 'turtle') {
                        if (e.state === 'walk') {
                            if (isStomping(player, e)) {
                                e.state = 'shell_idle';
                                e.vx = 0;
                                player.vy = -5;
                                player.score += 100;
                                sndStomp();
                            } else {
                                die();
                            }
                        } else if (e.state === 'shell_idle') {
                            // Kick the shell
                            e.state = 'shell_moving';
                            e.vx = (player.x < e.x) ? 3 : -3;
                            e.dir = Math.sign(e.vx);
                            sndKick();
                            player.x += (player.x < e.x) ? -3 : 3; // minimal pushback
                        } else if (e.state === 'shell_moving') {
                            if (isStomping(player, e)) {
                                e.state = 'shell_idle';
                                e.vx = 0;
                                player.vy = -5;
                                sndStomp();
                            } else {
                                die();
                            }
                        }
                    }
                }
            }

            for (let i = coins.length - 1; i >= 0; i--) {
                let cn = coins[i];
                if (cn.pop) {
                    cn.y += cn.vy;
                    cn.vy += gravity;
                    if (cn.vy > 0 && cn.y > cn.startY) coins.splice(i, 1);
                } else if (!player.dead && !player.won && hit(player, cn)) {
                    player.score += 10;
                    player.coins++;
                    sndCoin();
                    coins.splice(i, 1);
                }
            }

            scoreEl.innerText = String(player.score).padStart(6, '0');
            coinsEl.innerText = String(player.coins).padStart(2, '0');
        }

        function draw() {
            ctx.fillStyle = '#5c94fc';
            ctx.fillRect(0, 0, c.width, c.height);

            let targetCamX = player.x - 150;
            if (targetCamX < 0) targetCamX = 0;
            let maxCamX = levelDesign[0].length * 16 - 400;
            if (targetCamX > maxCamX) targetCamX = maxCamX;

            camX += (targetCamX - camX) * 0.1;

            ctx.save();
            ctx.translate(-Math.floor(camX), 0);

            // Draw clouds (Pure Parallax effect)
            for (let c of clouds) {
                let parallaxX = c.x + (camX * c.layer);
                let levelPixelWidth = levelDesign[0].length * 16;
                let drawX = parallaxX % levelPixelWidth;
                if (drawX < 0) drawX += levelPixelWidth;

                ctx.save();
                ctx.translate(Math.floor(drawX), Math.floor(c.y));
                ctx.scale(c.size, c.size);
                ctx.drawImage(imgs.cloud, 0, 0);
                ctx.restore();
            }

            if (flagData) {
                ctx.drawImage(imgs.flag, Math.floor(flagData.x), Math.floor(flagData.flagY));
            }

            for (let cn of coins) ctx.drawImage(imgs.coin, Math.floor(cn.x - 4), Math.floor(cn.y));

            for (let b of blocks) {
                if (b.padding) continue;
                let spr = imgs[b.type];
                if (b.type === 'question' && b.activated) spr = imgs.empty;
                if (spr) ctx.drawImage(spr, b.x, Math.floor(b.y + (b.yOffset || 0)));
            }

            for (let b of blocks) {
                if (b.type === 'poleTop') {
                    ctx.drawImage(imgs.poleTop, b.x, Math.floor(b.y));
                }
            }

            for (let e of enemies) {
                if (e.state === 'dead' && e.deadTimer === 0) continue;

                ctx.save();
                ctx.translate(Math.floor(e.x + e.w / 2), Math.floor(e.y));
                ctx.scale(e.dir || 1, 1);

                let spr;
                if (e.type === 'goomba') {
                    spr = imgs.goombaWalk1;
                    if (e.state === 'dead' && e.deadTimer > 0) spr = imgs.goombaDead;
                    else if (Math.floor(Date.now() / 200) % 2 === 0) spr = imgs.goombaWalk2;
                } else if (e.type === 'turtle') {
                    spr = imgs.turtleWalk1;
                    if (e.state === 'shell_idle') spr = imgs.turtleShell;
                    else if (e.state === 'shell_moving') spr = imgs.turtleShell; // no spin anim for now
                    else if (Math.floor(Date.now() / 200) % 2 === 0) spr = imgs.turtleWalk2;
                }

                ctx.drawImage(spr, -e.w / 2, 0);
                ctx.restore();
            }

            let cx = Math.floor(player.x + player.w / 2);
            let cy = Math.floor(player.y + player.h - 8);
            ctx.translate(cx, cy);
            ctx.scale(player.dir, 1);

            let pspr = imgs.marioStand;
            if (player.dead) pspr = imgs.marioDead;
            else if (player.won) pspr = (Math.floor(player.climbTimer / 5) % 2 === 0) ? imgs.marioClimb : imgs.marioStand;
            else if (!player.ground) pspr = imgs.marioJump;
            else if (Math.abs(player.vx) > 0.5) pspr = (Math.floor(Date.now() / 150) % 2 === 0) ? imgs.marioWalk : imgs.marioStand;

            ctx.drawImage(pspr, -8, -8);
            ctx.restore();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>
