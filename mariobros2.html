<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <title>Super Mario JS</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #5c94fc;
        }

        canvas {
            display: block;
            margin: auto;
            background: #87ceeb;
        }
    </style>
</head>

<body>

    <canvas id="game" width="900" height="450"></canvas>

    <script>
        const canvas = document.getElementById("game");
        const ctx = canvas.getContext("2d");

        // ===== PLAYER =====
        const player = {
            x: 100,
            y: 0,
            w: 40,
            h: 50,
            dx: 0,
            dy: 0,
            speed: 5,
            jump: 14,
            grounded: false,
            big: false,
            lives: 3,
            score: 0
        };

        const gravity = 0.7;
        let cameraX = 0;

        // ===== INPUT =====
        const keys = {};
        addEventListener("keydown", e => keys[e.code] = true);
        addEventListener("keyup", e => keys[e.code] = false);

        // ===== WORLD =====
        const levelEnd = 2800;

        const platforms = [
            { x: 0, y: 400, w: 3000, h: 50, type: "ground" },
            { x: 300, y: 320, w: 100, h: 20, type: "brick" },
            { x: 500, y: 260, w: 100, h: 20, type: "brick" },
            { x: 700, y: 200, w: 100, h: 20, type: "brick" },
            { x: 900, y: 320, w: 120, h: 20, type: "question" },
            { x: 1200, y: 260, w: 120, h: 20, type: "brick" },
            { x: 1500, y: 200, w: 120, h: 20, type: "brick" },
            { x: 1900, y: 320, w: 120, h: 20, type: "brick" },
        ];

        // ===== POWER UP =====
        const mushrooms = [];

        // ===== ENEMIES =====
        const enemies = [
            { x: 600, y: 360, w: 40, h: 40, dx: -1.2, alive: true },
            { x: 1300, y: 360, w: 40, h: 40, dx: -1.2, alive: true },
            { x: 2100, y: 360, w: 40, h: 40, dx: -1.2, alive: true }
        ];

        // ===== COLLISION =====
        function hit(a, b) {
            return a.x < b.x + b.w &&
                a.x + a.w > b.x &&
                a.y < b.y + b.h &&
                a.y + a.h > b.y;
        }

        // ===== UPDATE =====
        function update() {

            // Movimento
            player.dx = 0;
            if (keys["ArrowRight"]) player.dx = player.speed;
            if (keys["ArrowLeft"]) player.dx = -player.speed;

            if (keys["Space"] && player.grounded) {
                player.dy = -player.jump;
                player.grounded = false;
            }

            player.dy += gravity;

            player.x += player.dx;
            player.y += player.dy;

            player.grounded = false;

            // Collisione piattaforme
            platforms.forEach(p => {
                if (hit(player, p)) {

                    // Da sopra
                    if (player.dy >= 0 && player.y + player.h - player.dy <= p.y) {
                        player.y = p.y - player.h;
                        player.dy = 0;
                        player.grounded = true;
                    }

                    // Da sotto (rompi blocchi)
                    else if (player.dy < 0) {
                        if (p.type === "brick") {
                            p.broken = true;
                            player.score += 50;
                        }

                        if (p.type === "question" && !p.used) {
                            p.used = true;
                            mushrooms.push({ x: p.x + 30, y: p.y - 40, w: 30, h: 30, dx: 1 });
                        }

                        player.dy = 0;
                    }
                }
            });

            // Rimuovi blocchi rotti
            for (let i = platforms.length - 1; i >= 0; i--) {
                if (platforms[i].broken) platforms.splice(i, 1);
            }

            // ===== MUSHROOM =====
            mushrooms.forEach(m => {
                m.x += m.dx;

                if (hit(player, m)) {
                    player.big = true;
                    player.h = 80;
                    player.score += 200;
                    m.collected = true;
                }
            });

            for (let i = mushrooms.length - 1; i >= 0; i--) {
                if (mushrooms[i].collected) mushrooms.splice(i, 1);
            }

            // ===== ENEMIES =====
            enemies.forEach(e => {
                if (!e.alive) return;

                e.x += e.dx;

                if (hit(player, e)) {
                    // Schiacciato
                    if (player.dy > 0) {
                        e.alive = false;
                        player.dy = -8;
                        player.score += 100;
                    }
                    else {
                        damage();
                    }
                }
            });

            // ===== CADUTA =====
            if (player.y > canvas.height) {
                damage();
            }

            // ===== CAMERA =====
            cameraX = player.x - 200;
            if (cameraX < 0) cameraX = 0;

            // ===== VITTORIA =====
            if (player.x > levelEnd) {
                alert("🏆 Hai salvato il Regno dei Funghi!");
                location.reload();
            }
        }

        // ===== DAMAGE =====
        function damage() {
            player.lives--;
            if (player.lives <= 0) {
                alert("💀 GAME OVER");
                location.reload();
            }
            player.x = cameraX + 100;
            player.y = 0;
            player.dy = 0;
        }

        // ===== DRAW =====
        function draw() {

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(-cameraX, 0);

            // Player
            ctx.fillStyle = player.big ? "#ff5555" : "red";
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // Platforms
            platforms.forEach(p => {
                if (p.type === "ground") ctx.fillStyle = "#5c3a21";
                else if (p.type === "brick") ctx.fillStyle = "#b85f2e";
                else ctx.fillStyle = "#ffd800";
                ctx.fillRect(p.x, p.y, p.w, p.h);
            });

            // Mushrooms
            ctx.fillStyle = "orange";
            mushrooms.forEach(m => {
                ctx.fillRect(m.x, m.y, m.w, m.h);
            });

            // Enemies
            ctx.fillStyle = "brown";
            enemies.forEach(e => {
                if (e.alive) ctx.fillRect(e.x, e.y, e.w, e.h);
            });

            ctx.restore();

            // HUD
            ctx.fillStyle = "white";
            ctx.font = "20px Arial";
            ctx.fillText("Punteggio: " + player.score, 20, 30);
            ctx.fillText("Vite: " + player.lives, 20, 60);
        }

        // ===== GAME LOOP =====
        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        loop();
    </script>

</body>

</html>
